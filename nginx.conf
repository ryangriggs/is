    ssl_protocols TLSv1.2 TLSv1.3; ssl_ciphers HIGH:!aNULL:!MD5;
    return 301 https://IS_AM_DOMAIN/l$request_uri; }

# Main HTTPS server (handles all subdomains via wildcard)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name IS_AM_DOMAIN *.IS_AM_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/IS_AM_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/IS_AM_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Pass real client IP to Node
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $host;

    # WebSocket support (for future use)
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    location / {
        proxy_pass http://127.0.0.1:3000;
    }
}
