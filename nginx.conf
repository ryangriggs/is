# Replace DOMAIN with your domain (e.g. optizo.com) throughout this file.
# Replace APP_PORT with the PORT value from your .env (default: 3000).

server {
    server_name DOMAIN *.DOMAIN;

    merge_slashes off;

    # Redirect feature subdomains to their path on the main domain
    if ($host = "t.DOMAIN") { return 301 https://DOMAIN/t$request_uri; }
    if ($host = "h.DOMAIN") { return 301 https://DOMAIN/h$request_uri; }
    if ($host = "i.DOMAIN") { return 301 https://DOMAIN/i$request_uri; }
    if ($host = "b.DOMAIN") { return 301 https://DOMAIN/b$request_uri; }
    if ($host = "d.DOMAIN") { return 301 https://DOMAIN/d$request_uri; }
    if ($host = "q.DOMAIN") { return 301 https://DOMAIN/q$request_uri; }
    if ($host = "a.DOMAIN") { return 301 https://DOMAIN/a$request_uri; }
    if ($host = "l.DOMAIN") { return 301 https://DOMAIN/l$request_uri; }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:APP_PORT;

        # Pass real client IP
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass the original Host header (needed for subdomain detection)
        proxy_set_header Host $host;

        # Required for HTTP/1.1 and WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffer settings for file uploads
        proxy_request_buffering off;
        client_max_body_size 20M;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = DOMAIN) {
        return 301 https://$host$request_uri;
    }

    # Also redirect subdomains HTTP → HTTPS
    if ($host ~ \.DOMAIN$) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name DOMAIN *.DOMAIN;
    return 404;
}
