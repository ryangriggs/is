# is.am nginx config
# Replace IS_AM_DOMAIN with your actual domain (e.g. is.am)
# Assumes Node app runs on localhost:3000
# Assumes SSL certs from certbot (adjust paths if needed)

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name IS_AM_DOMAIN *.IS_AM_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Feature subdomain redirects → paths on main domain
# Each feature subdomain redirects to its equivalent path.
# Example: t.IS_AM_DOMAIN → IS_AM_DOMAIN/t
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name t.IS_AM_DOMAIN h.IS_AM_DOMAIN i.IS_AM_DOMAIN b.IS_AM_DOMAIN d.IS_AM_DOMAIN q.IS_AM_DOMAIN a.IS_AM_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/IS_AM_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/IS_AM_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Extract the subdomain letter from the hostname and redirect to /letter/...
    location / {
        return 301 https://IS_AM_DOMAIN/$host_prefix$request_uri;
    }
}

# Per-subdomain redirects (nginx doesn't support variables in server_name easily,
# so define each one explicitly)
server { listen 443 ssl; listen [::]:443 ssl; server_name t.IS_AM_DOMAIN;
    ssl_certificate /etc/letsencrypt/live/IS_AM_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/IS_AM_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3; ssl_ciphers HIGH:!aNULL:!MD5;
    return 301 https://IS_AM_DOMAIN/t$request_uri; }

server { listen 443 ssl; listen [::]:443 ssl; server_name h.IS_AM_DOMAIN;
    ssl_certificate /etc/letsencrypt/live/IS_AM_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/IS_AM_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3; ssl_ciphers HIGH:!aNULL:!MD5;
