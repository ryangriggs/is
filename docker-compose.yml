services:
  app:
    build: .
    ports:
      - "3000:3000"
      - "53:5300/udp"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    env_file: .env
    environment:
      DNS_PORT: "5300"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional: MariaDB (set DB_TYPE=mysql in .env to use)
